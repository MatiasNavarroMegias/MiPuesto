services:
  - type: web
    name: mipuesto-api
    env: node
    plan: free
    rootDir: services/api
    buildCommand: npm run build
    startCommand: node dist/main.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://mipuesto.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
